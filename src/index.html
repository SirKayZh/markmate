<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkPad</title>
  <link rel="stylesheet" href="../node_modules/vditor/dist/index.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部拖拽区（macOS 红绿灯下方留白） -->
  <div id="drag-bar">
    <button id="quick-open-btn" type="button" title="快速打开（⌘P）" aria-label="快速打开">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button id="favorite-toggle" type="button" title="收藏当前文件（⌘D）" aria-label="收藏当前文件">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </button>
    <button id="source-toggle" type="button" title="切换源码面板（⌘E）" aria-label="切换源码面板">
      <!-- 两个竖条图标：表示双栏 -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="8" height="16" rx="1.5"/>
        <rect x="13" y="4" width="8" height="16" rx="1.5"/>
      </svg>
    </button>
    <button id="theme-toggle" type="button" title="切换主题（⌘/）" aria-label="切换主题">
      <!-- 单一图标：一个一半亮一半暗的圆，点击循环 亮 → 暗 → 跟随系统 -->
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>

  <div id="app">
    <!-- 大纲侧栏 -->
    <aside id="outline">
      <div class="outline-title">
        <div class="outline-tabs">
          <button class="outline-tab active" data-tab="files" title="文件管理">📁 文件</button>
          <button class="outline-tab" data-tab="outline" title="大纲导航">📑 大纲</button>
        </div>
        <button id="outline-toggle" type="button" title="收起侧栏（⌘\）" aria-label="收起侧栏">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <!-- 大纲内容（自绘树，支持多级折叠+缩进） -->
      <div id="outline-content" class="hidden">
        <div id="outline-tree" class="outline-tree"></div>
        <div id="outline-empty" class="outline-empty">暂无标题，先在文档中添加 # / ## 标题</div>
      </div>
      <!-- 文件管理内容 -->
      <div id="files-content">
        <!-- 文件管理内的搜索框 -->
        <div class="files-search">
          <input id="files-search-input" type="search" placeholder="🔍 搜索文件名…" spellcheck="false" autocomplete="off">
        </div>
        <div class="files-section" data-section="fav">
          <div class="files-section-title" data-toggle="fav">
            <span class="fs-chevron">▾</span><span class="fs-label">⭐ 收藏夹</span><span class="fs-count" id="fav-count"></span>
          </div>
          <div id="fav-list" class="files-list"></div>
        </div>
        <div class="files-section" data-section="recent">
          <div class="files-section-title" data-toggle="recent">
            <span class="fs-chevron">▾</span><span class="fs-label">🕐 最近打开</span><span class="fs-count" id="recent-count"></span>
          </div>
          <div id="recent-list" class="files-list"></div>
        </div>
        <div class="files-section" data-section="folder">
          <div class="files-section-title" data-toggle="folder">
            <span class="fs-chevron">▾</span><span class="fs-label">📂 当前文件夹</span><span class="fs-count" id="folder-count"></span>
          </div>
          <div id="folder-list" class="files-list"></div>
        </div>
      </div>
    </aside>

    <!-- 大纲 ↔ 编辑器 拖拽分隔条 -->
    <div id="outline-resizer" class="resizer"></div>

    <!-- 编辑器（中间：WYSIWYG 渲染区） -->
    <main id="editor-wrap">
      <div id="vditor"></div>
    </main>

    <!-- 编辑器 ↔ 源码 拖拽分隔条 -->
    <div id="source-resizer" class="resizer hidden"></div>

    <!-- 右侧源码面板（可收起） -->
    <aside id="source-pane" class="hidden">
      <div class="source-title">
        <span>Markdown 源码</span>
        <button id="source-close" type="button" title="收起" aria-label="收起源码面板">×</button>
      </div>
      <textarea id="source-editor" spellcheck="false" placeholder="Markdown 源码…"></textarea>
    </aside>
  </div>

  <!-- 底部状态栏 -->
  <footer id="statusbar">
    <span id="status-file">未命名</span>
    <span class="spacer"></span>
    <span id="status-words">0 字</span>
    <span id="status-cursor">行 1, 列 1</span>
  </footer>

  <script src="../node_modules/vditor/dist/index.min.js"></script>
  <!-- 快速打开模态框（⌘P）—— 必须在 renderer.js 之前出现在 DOM 中 -->
  <div id="quick-open-overlay" class="hidden">
    <div id="quick-open-panel">
      <input id="quick-open-input" type="text" placeholder="搜索文件名打开…" spellcheck="false" autocomplete="off">
      <div id="quick-open-results"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
