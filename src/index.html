<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkPad</title>
  <link rel="stylesheet" href="../node_modules/vditor/dist/index.css">
  <link rel="stylesheet" href="../node_modules/prismjs/themes/prism.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 顶部拖拽区（macOS 红绿灯下方留白） -->
  <div id="drag-bar">
    <button id="find-btn" type="button" title="文档内搜索（⌘F）" aria-label="文档内搜索">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
    <button id="favorite-toggle" type="button" title="收藏当前文件（⌘D）" aria-label="收藏当前文件">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </button>
    <button id="source-toggle" type="button" title="切换源码面板（⌘E）" aria-label="切换源码面板">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="8" height="16" rx="1.5"/>
        <rect x="13" y="4" width="8" height="16" rx="1.5"/>
      </svg>
    </button>
    <button id="format-code-btn" type="button" title="格式化（仅 JSON/XML/YAML 等代码文件可用）" aria-label="格式化代码" disabled>格式化</button>
    <button id="theme-toggle" type="button" title="切换主题（⌘/）" aria-label="切换主题">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>

  <!-- Tab 栏 -->
  <div id="tab-bar">
    <div id="tab-bar-content"></div>
    <button id="tab-new-btn" type="button" title="新建标签页（⌘T）" aria-label="新建标签页">+</button>
  </div>

  <div id="app">
    <!-- 大纲侧栏 -->
    <aside id="outline">
      <div class="outline-title">
        <div class="outline-tabs">
          <button class="outline-tab active" data-tab="files" title="文件管理">📁 文件</button>
          <button class="outline-tab" data-tab="outline" title="大纲导航">📑 大纲</button>
        </div>
        <button id="outline-toggle" type="button" title="收起侧栏（⌘\）" aria-label="收起侧栏">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      <div id="outline-content" class="hidden">
        <div id="outline-tree" class="outline-tree"></div>
        <div id="outline-empty" class="outline-empty">暂无标题，先在文档中添加 # / ## 标题</div>
      </div>
      <div id="files-content">
        <div class="files-search">
          <input id="files-search-input" type="search" placeholder="🔍 搜索文件名…" spellcheck="false" autocomplete="off">
        </div>
        <div class="files-section" data-section="fav">
          <div class="files-section-title" data-toggle="fav">
            <span class="fs-chevron">▾</span><span class="fs-label">⭐ 收藏夹</span><span class="fs-count" id="fav-count"></span>
          </div>
          <div id="fav-list" class="files-list"></div>
        </div>
        <div class="files-section" data-section="recent">
          <div class="files-section-title" data-toggle="recent">
            <span class="fs-chevron">▾</span><span class="fs-label">🕐 最近打开</span><span class="fs-count" id="recent-count"></span>
          </div>
          <div id="recent-list" class="files-list"></div>
        </div>
        <div class="files-section" data-section="folder">
          <div class="files-section-title" data-toggle="folder">
            <span class="fs-chevron">▾</span><span class="fs-label">📂 当前文件夹</span><span class="fs-count" id="folder-count"></span>
          </div>
          <div id="folder-list" class="files-list"></div>
        </div>
      </div>
    </aside>

    <div id="outline-resizer" class="resizer"></div>

    <main id="editor-wrap">
      <div id="vditor"></div>
      <div id="code-editor-wrap" style="display:none">
        <pre id="code-highlight" aria-hidden="true"><code></code></pre>
        <textarea id="code-editor" spellcheck="false" autocomplete="off"
                  wrap="off" placeholder="代码 / 配置文件…"></textarea>
      </div>
    </main>

    <div id="source-resizer" class="resizer hidden"></div>

    <aside id="source-pane" class="hidden">
      <div class="source-title">
        <span>Markdown 源码</span>
        <button id="source-close" type="button" title="收起" aria-label="收起源码面板">×</button>
      </div>
      <textarea id="source-editor" spellcheck="false" placeholder="Markdown 源码…"></textarea>
    </aside>
  </div>

  <footer id="statusbar">
    <span id="status-file">未命名</span>
    <span class="spacer"></span>
    <span id="status-codelang" style="display:none"></span>
    <span id="status-autosave"></span>
    <span id="status-words">0 字</span>
    <span id="status-cursor">行 1, 列 1</span>
  </footer>

  <script src="../node_modules/vditor/dist/index.min.js"></script>
  <script src="../node_modules/prismjs/prism.js"></script>
  <script src="../node_modules/prismjs/components/prism-json.min.js"></script>
  <script src="../node_modules/prismjs/components/prism-yaml.min.js"></script>
  <script src="../node_modules/prismjs/components/prism-markup.min.js"></script>
  <script src="../node_modules/html-docx-js/dist/html-docx.js"></script>

  <!-- Tab 右键菜单 -->
  <div id="tab-context-menu" class="hidden">
    <button data-action="close">关闭标签页</button>
    <button data-action="close-others">关闭其他标签页</button>
    <button data-action="close-right">关闭右侧标签页</button>
    <button data-action="detach">移到新窗口</button>
    <button data-action="reveal" id="tab-ctx-reveal">在 Finder 中显示</button>
  </div>

  <div id="quick-open-overlay" class="hidden">
    <div id="quick-open-panel">
      <input id="quick-open-input" type="text" placeholder="搜索文件名打开…" spellcheck="false" autocomplete="off">
      <div id="quick-open-results"></div>
    </div>
  </div>
  <div id="link-dialog-overlay" class="hidden">
    <div id="link-dialog-panel">
      <div class="link-dialog-title">插入链接</div>
      <label class="link-dialog-field">
        <span>链接文字</span>
        <input id="link-dialog-text" type="text" placeholder="显示的文字（留空则用 URL）" spellcheck="false" autocomplete="off">
      </label>
      <label class="link-dialog-field">
        <span>链接地址</span>
        <input id="link-dialog-url" type="text" placeholder="https://…" spellcheck="false" autocomplete="off">
      </label>
      <div class="link-dialog-actions">
        <button id="link-dialog-cancel" type="button">取消</button>
        <button id="link-dialog-ok" type="button" class="primary">插入</button>
      </div>
    </div>
  </div>
  <div id="find-bar" class="hidden">
    <input id="find-input" type="text" placeholder="在文档中搜索…" spellcheck="false" autocomplete="off">
    <span id="find-count">0/0</span>
    <button id="find-prev" type="button" title="上一个（⇧Enter）" aria-label="上一个">↑</button>
    <button id="find-next" type="button" title="下一个（Enter）" aria-label="下一个">↓</button>
    <button id="find-close" type="button" title="关闭（Esc）" aria-label="关闭">×</button>
  </div>
  <div id="versions-overlay" class="hidden">
    <div id="versions-panel">
      <div class="versions-head">
        <span>历史版本</span>
        <button id="versions-close" type="button">×</button>
      </div>
      <div class="versions-body">
        <div id="versions-list"></div>
        <div id="versions-preview">
          <div id="versions-preview-meta"></div>
          <pre id="versions-preview-content"></pre>
          <div class="versions-actions">
            <button id="versions-restore" type="button" disabled>恢复到这个版本</button>
            <button id="versions-copy" type="button" disabled>复制内容</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="draft-banner" class="hidden">
    <span>检测到上次未保存的草稿</span>
    <button id="draft-restore" type="button">恢复</button>
    <button id="draft-discard" type="button">忽略</button>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
