name: 💡 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea clearly.
        感谢你的建议！请清晰描述你的想法。
  - type: textarea
    id: problem
    attributes:
      label: Problem / 痛点
      description: What problem are you trying to solve? Is there a pain point in your current workflow?
      placeholder: "Every time I want to ..., I have to ..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution / 建议方案
      description: Describe what you'd like to see in MarkMate.
      placeholder: "It would be great if MarkMate could..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 你试过的替代方案
      description: Any workarounds or other tools you've tried?
      placeholder: "I currently use ... to achieve this, but it's not ideal because..."
  - type: textarea
    id: context
    attributes:
      label: Additional Context / 补充信息
      description: Screenshots, references to other tools, or anything else that helps explain the idea.
