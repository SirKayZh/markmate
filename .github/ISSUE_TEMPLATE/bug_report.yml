name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        感谢你花时间提交 Bug 报告！
  - type: input
    id: version
    attributes:
      label: MarkPad Version / 版本
      description: Which version of MarkPad are you using? (Help → About)
      placeholder: "e.g. 1.6.1"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System / 操作系统
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 10
        - Windows 11
        - Linux
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened? / 发生了什么？
      description: Describe the bug clearly. What did you expect to happen?
      placeholder: |
        1. Opened a file...
        2. Clicked on...
        3. Saw this error...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: Exact steps so we can reproduce the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Additional Context / 补充信息
      description: Any screenshots, error messages, or file content that helps?
      placeholder: Paste screenshots or error messages here.
